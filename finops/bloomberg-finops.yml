specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Bloomberg
providerId: bloomberg
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Market Data
  - Enterprise
  - Financial Services
description: 'FOCUS-aligned FinOps for Bloomberg: per-user Terminal seat subscriptions plus
  contract-negotiated enterprise data feeds (B-PIPE, Data License). Spend is dominated by named-user
  Terminal seats and per-feed enterprise data licenses.'
sources:
  - https://www.bloomberg.com/professional/products/bloomberg-terminal/
  - https://en.wikipedia.org/wiki/Bloomberg_Terminal
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Bloomberg L.P.
serviceCategory: Market Data / Financial Services
billingModel:
  pricingCategory: Subscription (Seat) + Enterprise Data License
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Bloomberg
  ServiceCategory: Market Data
  ProviderName: Bloomberg
  PublisherName: Bloomberg L.P.
  InvoiceIssuerName: Bloomberg L.P.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: terminal_seats
    unit: seat-year
    aggregation: sum
    dimensions:
      - named_user
      - office
      - cost_center
  - name: blpapi_requests
    unit: request
    aggregation: sum
    dimensions:
      - service
      - terminal_user
      - application
  - name: bpipe_updates
    unit: update
    aggregation: sum
    dimensions:
      - exchange
      - feed
      - application
  - name: data_license_records
    unit: record
    aggregation: sum
    dimensions:
      - product
      - field
      - exchange
  - name: enterprise_module_subscriptions
    unit: month
    aggregation: sum
    dimensions:
      - product
      - department
principles:
  - name: Visibility
    description: Use BPS<GO> (Bloomberg Profile Statistics) and the Customer Service portal for
      seat-level usage; pull WAPI<GO> usage tables to track BDH/BDP daily quota burn against
      contractual ceilings.
  - name: Allocation
    description: Map each Terminal login (BUID) to a cost center / desk; reconcile annual
      seat-license invoices against the named-user roster.
  - name: Optimization
    description: Reclaim inactive seats during the annual renewal window; consolidate B-PIPE
      symbol subscriptions; favor Bloomberg Anywhere for hoteling instead of dedicated seats; route
      bulk historical pulls through Data License (EDF) instead of BLPAPI to avoid per-Terminal caps.
  - name: Accountability
    description: Designate a Terminal Administrator per legal entity; review the SR<GO> Service
      Reports monthly; run quarterly seat-utilization reviews with the Bloomberg account team.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
