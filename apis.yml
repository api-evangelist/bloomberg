- name: Bloomberg EMSX API
  description: Enables programmatic management and automation of equities, futures, and options trading through the Bloomberg Execution Management System, providing access to 2,000+ global execution venues with support for C++, C#, Python, Java, and Excel/VBA.
  image: https://www.bloomberg.com/favicon.ico
  humanURL: https://www.bloomberg.com/professional/products/trading/execution-management-system/
  tags:
  - Execution Management
  - Trading
