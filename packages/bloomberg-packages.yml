notes: >-
  Bloomberg distributes the BLPAPI SDK primarily through its own channels: the Python wheel is served
  from Bloomberg's own pip index (not PyPI — pypi.org/pypi/blpapi returns 404), and the C++, Java, and
  .NET SDKs are downloaded from the Bloomberg Professional API library page. The Node.js binding is the
  one first-party package on a public community registry (npm). Maven Central and NuGet carry no
  first-party Bloomberg BLPAPI artifacts (verified 2026-06-20).
