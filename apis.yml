- name: Bloomberg Desktop API (DAPI)
  description: Provides programmatic access to Bloomberg Terminal data for desktop applications, connecting through the locally running Bloomberg Professional software. Supports C++, .NET, Java, Python, and VBA for building custom analytics, data retrieval, and workflow automation tools that leverage Terminal authentication.
  image: https://www.bloomberg.com/favicon.ico
  humanURL: https://www.bloomberg.com/professional/support/api-library/
