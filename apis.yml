- name: Bloomberg Transaction Cost Analysis API (BTCA)
  description: Multi-asset transaction cost analysis solution that combines trade data with Bloomberg market data to deliver analysis against a wide range of benchmarks, with Data Access API enabling programmatic retrieval of TCA data via Python and other languages.
  image: https://www.bloomberg.com/favicon.ico
  humanURL: https://www.bloomberg.com/professional/products/trading/post-trade-services/btca/
