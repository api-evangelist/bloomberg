    email: apisupport@bloomberg.net
- name: Bloomberg BQuant API
  description: Turnkey quantitative analysis platform combining advanced compute power with programmatic access to Bloomberg data and analytics, built on open source tools like Python and JupyterLab and fully integrated with the Bloomberg Terminal. Includes Bloomberg Query Language (BQL) for performing custom calculations in the Bloomberg cloud.
  image: https://www.bloomberg.com/favicon.ico
  humanURL: https://www.bloomberg.com/professional/products/bloomberg-terminal/research/bquant/
