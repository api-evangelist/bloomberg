      description: Request Reference Data for One or More Securities and Fields.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: blpapi-core-reference-data.referencedatarequest
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
