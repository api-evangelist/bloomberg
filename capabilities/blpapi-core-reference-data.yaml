  description: 'Bloomberg BLPAPI Core — Reference Data. 1 operations. Lead operation: Request Reference Data for One or More
    Securities and Fields.. Self-contained Naftiko capability covering one Bloomberg business surface.'
  tags:
  - Bloomberg
  - Reference Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_API_KEY: BLOOMBERG_API_KEY
capability:
  consumes:
  - type: http
    namespace: blpapi-core-reference-data
    baseUri: ''
    description: Bloomberg BLPAPI Core — Reference Data business capability. Self-contained, no shared references.
    resources:
    - name: refdata-ReferenceDataRequest
      path: /refdata/ReferenceDataRequest
      operations:
      - name: referencedatarequest
        method: POST
        description: Request Reference Data for One or More Securities and Fields.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: blpapi-core-reference-data-rest
    port: 8080
    description: REST adapter for Bloomberg BLPAPI Core — Reference Data. One Spectral-compliant resource per consumed operation,
