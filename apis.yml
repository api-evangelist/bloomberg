- name: Bloomberg Market Data Feed (B-PIPE)
  description: High-performance global connectivity to consolidated, normalized real-time market data covering 35 million instruments from more than 330 exchanges and 5,000 pricing contributors across all asset classes, available on-premises and in the cloud via AWS, Azure, and Google Cloud.
  image: https://www.bloomberg.com/favicon.ico
  humanURL: https://www.bloomberg.com/professional/products/data/enterprise-catalog/real-time-data-feed/
