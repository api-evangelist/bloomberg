asyncapi: 3.0.0
info:
  title: Bloomberg BLPAPI Market Data Subscriptions
  version: '1.6'
  description: >-
    Event surface of the Bloomberg Open API (BLPAPI) Subscription paradigm. Clients call
    Session.subscribe(SubscriptionList) over a BLPAPI SDK session (Desktop API localhost:8194 or
    SAPI/B-PIPE host); streamed updates arrive as SUBSCRIPTION_DATA events correlated by
    CorrelationID, with lifecycle signals as SUBSCRIPTION_STATUS events (SubscriptionStarted /
    SubscriptionFailure). Derived from the BLPAPI Core Developer Guide v1.6 projection in this
    repository — Bloomberg does not publish a first-party AsyncAPI document.
  contact:
    name: Bloomberg L.P. — Enterprise / Open API
    url: https://www.bloomberg.com/professional/support/api-library/
defaultContentType: application/json
servers:
  desktop:
    host: 'localhost:8194'
    protocol: tcp
    description: Desktop API (local Bloomberg Professional terminal session, BLPAPI SDK transport)
  sapi:
    host: '{sapiHost}:8194'
    protocol: tcp
    description: Server API / B-PIPE host (BLPAPI SDK transport)
    variables:
      sapiHost:
        default: sapi.example.com
channels:
  mktdata:
    address: //blp/mktdata
    description: Streaming real-time market data (quotes, trades, sizes) per subscribed topic.
    messages:
