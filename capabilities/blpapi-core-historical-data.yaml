naftiko: 1.0.0-alpha2
info:
  label: Bloomberg BLPAPI Core — Historical Data
  description: 'Bloomberg BLPAPI Core — Historical Data. 1 operations. Lead operation: Request End-of-day Historical Data
    for One or More Securities.. Self-contained Naftiko capability covering one Bloomberg business surface.'
  tags:
  - Bloomberg
  - Historical Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_API_KEY: BLOOMBERG_API_KEY
capability:
  consumes:
  - type: http
    namespace: blpapi-core-historical-data
    baseUri: ''
    description: Bloomberg BLPAPI Core — Historical Data business capability. Self-contained, no shared references.
    resources:
    - name: refdata-HistoricalDataRequest
      path: /refdata/HistoricalDataRequest
      operations:
      - name: historicaldatarequest
        method: POST
        description: Request End-of-day Historical Data for One or More Securities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: blpapi-core-historical-data-rest
    port: 8080
    description: REST adapter for Bloomberg BLPAPI Core — Historical Data. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/refdata/historicaldatarequest
      name: refdata-historicaldatarequest
      description: REST surface for refdata-HistoricalDataRequest.
      operations:
      - method: POST
        name: historicaldatarequest
        description: Request End-of-day Historical Data for One or More Securities.
        call: blpapi-core-historical-data.historicaldatarequest
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: blpapi-core-historical-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg BLPAPI Core — Historical Data. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: request-end-day-historical-data
      description: Request End-of-day Historical Data for One or More Securities.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: blpapi-core-historical-data.historicaldatarequest
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
