  mktbar:
    address: //blp/mktbar
    description: Interval-based real-time OHLC bars per subscribed topic.
    messages:
      subscriptionStarted:
        $ref: '#/components/messages/subscriptionStarted'
      subscriptionFailure:
        $ref: '#/components/messages/subscriptionFailure'
  mktvwap:
    address: //blp/mktvwap
    description: Custom VWAP stream with override field/value pairings.
    messages:
      subscriptionStarted:
        $ref: '#/components/messages/subscriptionStarted'
      subscriptionFailure:
        $ref: '#/components/messages/subscriptionFailure'
operations:
  receiveMarketData:
    action: receive
    channel:
      $ref: '#/channels/mktdata'
    summary: Receive SUBSCRIPTION_DATA events with MarketDataEvents messages (maps to operationId subscribeMarketData).
  receiveMarketBars:
    action: receive
