- name: Bloomberg IOI API
  description: Enables programmatic publishing and subscribing to Indications of Interest (IOI) messages through Bloomberg API 3.0, allowing sell-side firms to automate IOI workflows and integrate streaming real-time IOI data into custom applications.
  image: https://www.bloomberg.com/favicon.ico
  humanURL: https://ioi-api-doc.readthedocs.io/
  tags:
  - Indications of Interest
  - Trading
