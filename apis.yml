    email: apisupport@bloomberg.net
- name: Bloomberg BLPAPI HTTP API
  description: HTTP and WebSocket wrapper for the Bloomberg Open API, enabling clients to access reference and historical request/response data as well as make subscriptions for live streaming market data over standard web protocols.
  image: https://www.bloomberg.com/favicon.ico
  humanURL: https://github.com/bloomberg/blpapi-http
