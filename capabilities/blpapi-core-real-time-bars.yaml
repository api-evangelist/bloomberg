naftiko: 1.0.0-alpha2
info:
  label: Bloomberg BLPAPI Core — Real-Time Bars
  description: 'Bloomberg BLPAPI Core — Real-Time Bars. 1 operations. Lead operation: Subscribe to Interval-based Real-time
    Bars.. Self-contained Naftiko capability covering one Bloomberg business surface.'
  tags:
  - Bloomberg
  - Real-Time Bars
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOMBERG_API_KEY: BLOOMBERG_API_KEY
capability:
  consumes:
  - type: http
    namespace: blpapi-core-real-time-bars
    baseUri: ''
    description: Bloomberg BLPAPI Core — Real-Time Bars business capability. Self-contained, no shared references.
    resources:
    - name: mktbar-subscribe
      path: /mktbar/subscribe
      operations:
      - name: subscribemarketbar
        method: POST
        description: Subscribe to Interval-based Real-time Bars.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: blpapi-core-real-time-bars-rest
    port: 8080
    description: REST adapter for Bloomberg BLPAPI Core — Real-Time Bars. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/mktbar/subscribe
      name: mktbar-subscribe
      description: REST surface for mktbar-subscribe.
      operations:
      - method: POST
        name: subscribemarketbar
        description: Subscribe to Interval-based Real-time Bars.
        call: blpapi-core-real-time-bars.subscribemarketbar
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: blpapi-core-real-time-bars-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloomberg BLPAPI Core — Real-Time Bars. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: subscribe-interval-based-real-time
      description: Subscribe to Interval-based Real-time Bars.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: blpapi-core-real-time-bars.subscribemarketbar
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
